name: Create Release Zip

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the zip to (e.g. v1.1.0)'
        # Deliberately not required: a required dispatch input has no value when
        # the workflow is compiled for a release event.
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build and attach plugin zip
    runs-on: ubuntu-latest

    steps:
      # The only action this workflow uses. The upload step below runs on the
      # preinstalled gh CLI rather than a third-party action, which keeps the
      # dependency surface to one first-party action with nothing else to track
      # through deprecations.
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # `inputs` is null outside workflow_dispatch; `github.event.inputs`
          # is not defined for a release event at all.
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Build plugin zip
        run: |
          set -euo pipefail
          mkdir -p build/palmasleepscreen.koplugin
          # git archive applies the export-ignore rules in .gitattributes, so the
          # exclusion list lives with the repo rather than being duplicated here
          # where it would drift. It also cannot pick up untracked files, so the
          # zip is exactly the committed tree.
          git archive --format=tar HEAD | tar -x -C build/palmasleepscreen.koplugin
          cd build
          zip -r palmasleepscreen.koplugin.zip palmasleepscreen.koplugin
          echo "--- archive contents ---"
          unzip -l palmasleepscreen.koplugin.zip

      - name: Verify the plugin is intact
        run: |
          set -euo pipefail
          cd build/palmasleepscreen.koplugin
          # A zip that is missing these is worse than a failed build: it installs
          # and then does nothing.
          test -f main.lua
          test -f _meta.lua
          grep -q 'version' _meta.lua
          echo "packaged version: $(grep -o 'version = "[^"]*"' _meta.lua)"

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.tag || github.ref_name }}" \
            build/palmasleepscreen.koplugin.zip --clobber
