name: Create Release Zip

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach zip to (e.g., v1.1.0)'
        # Must not be required. A required dispatch input has no value when the
        # workflow is compiled for a release event, which fails the run before it
        # starts (startup_failure / BuildFailed) -- so the release trigger breaks
        # while manual dispatch keeps working.
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # `inputs` rather than `github.event.inputs`: the former is null on a
          # release event, the latter is not defined for it at all.
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Create plugin directory structure
        run: |
          mkdir -p build/palmasleepscreen.koplugin
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='.claude' \
                    --exclude='build' \
                    --exclude='screenshots' \
                    --exclude='.gitignore' \
                    --exclude='.gitattributes' \
                    . build/palmasleepscreen.koplugin/

      - name: Create zip archive
        run: |
          cd build
          zip -r palmasleepscreen.koplugin.zip palmasleepscreen.koplugin

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: build/palmasleepscreen.koplugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
